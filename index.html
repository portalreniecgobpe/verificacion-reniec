<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>

body{

<div style="background:#fff;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ddd;">

<div style="display:flex;align-items:center;gap:8px;">

<div style="color:#666;font-weight:bold;font-size:18px;">DNI<span style="color:#c92a2a;">e</span></div>
</div>

<div style="color:#2b579a;font-size:22px;border-left:1px solid #ccc;padding-left:20px;">
PORTAL DEL <span style="font-weight:700;">CIUDADANO</span>
</div>
</div>

<div style="color:#777;font-size:14px;">Bienvenido</div>
</div>

<div style="background-color:#337ab7;color:white;padding:12px 40px;font-size:16px;">
👤⚙️ Utilitarios DNIe
</div>

<div style="flex-grow:1;padding:40px 20px;display:flex;justify-content:center;">
<div style="width:100%;max-width:900px;background:#fff;border:1px solid #ddd;box-shadow:0 4px 15px rgba(0,0,0,0.05);border-radius:4px;">

<div style="color:#337ab7;padding:25px 0;margin:0 40px;text-align:center;font-size:22px;border-bottom:1px solid #2b579a;">
Verificación de documentos emitidos virtualmente
</div>

<div style="padding:30px 40px 40px 40px;">

<div style="display:flex;gap:60px;margin-bottom:35px;">

<div style="flex:1;">
<span style="font-size:12px;color:#888;font-weight:700;">Número de serie</span>
<input id="serie" type="text" style="width:100%;border:none;border-bottom:1px solid #2b579a;">
</div>

<div style="flex:1;">
<span style="font-size:12px;color:#888;font-weight:700;">Fecha de emisión</span>
<input id="fecha-emision" type="text" style="width:100%;border:none;border-bottom:1px solid #2b579a;">
</div>

</div>

<div style="background:#4a9b33;color:#fff;padding:16px;margin-bottom:35px;">
El presente documento ha sido emitido por el RENIEC.
</div>

<table style="width:100%;font-size:14px;border-collapse:collapse;">

<tr>
<td style="padding:16px;background:#2e6093;color:#fff;font-weight:700;width:35%;">Tipo de documento emitido</td>
<td id="tipo" style="padding:16px;"></td>
</tr>

<tr>
<td style="padding:16px;background:#2e6093;color:#fff;font-weight:700;">Nombre del titular</td>
<td id="titular" style="padding:16px;"></td>
</tr>

<tr>
<td style="padding:16px;background:#2e6093;color:#fff;font-weight:700;">DNI del solicitante</td>
<td id="dni" style="padding:16px;"></td>
</tr>

<tr>
<td style="padding:16px;background:#2e6093;color:#fff;font-weight:700;">Nombre del solicitante</td>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script>

flatpickr("#fecha-emision",{dateFormat:"d/m/Y",locale:"es"});

const sheetURL="https://docs.google.com/spreadsheets/d/1QkUEKjfgUR6JGK-cibphy8A0Uv9SpNZZoeydX9cjCdY/gviz/tq?tqx=out:csv";

function getParam(p){
const url=new URLSearchParams(window.location.search);
return url.get(p);
}

window.onload=function(){

const serie=getParam("serie");
const fecha=getParam("fecha");

if(serie) document.getElementById("serie").value=serie;
if(fecha) document.getElementById("fecha-emision").value=fecha;

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

const filas=data.split("\n").slice(1);

filas.forEach(f=>{

// detecta si el CSV usa ; o ,
const separador = f.includes(";") ? ";" : ",";

const c=f.split(separador).map(x=>x.replace(/"/g,"").trim());

if(c[0]==serie && c[1]==fecha){

document.getElementById("tipo").innerText=c[2];
document.getElementById("titular").innerText=c[3];
document.getElementById("dni").innerText=c[4];
document.getElementById("solicitante").innerText=c[5];

}

});

});

}

</script>
